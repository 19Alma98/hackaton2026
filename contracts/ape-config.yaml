name: hackaton2026-contracts

dependencies:
  - name: OpenZeppelin
    github: OpenZeppelin/openzeppelin-contracts
    version: 4.9.6

solidity:
  version: 0.8.19
  import_remapping:
    - "@openzeppelin=OpenZeppelin/4.9.6"

node:
  ethereum:
    local:
      # For LAN deployment, change to a remote node IP (e.g. http://192.168.2.208:8545)
      # or set the RPC_URL env var — the deploy script will override this value.
      uri: http://localhost:8545
      chain_id: 1337
