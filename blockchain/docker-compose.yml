x-geth-common: &geth-common
  image: ethereum/client-go:v1.13.15
  entrypoint: /entrypoint.sh
  restart: unless-stopped
  networks:
    - ethnet
  healthcheck:
    test: ["CMD-SHELL", "geth attach http://localhost:8545 --exec eth.blockNumber || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 10s

services:
  nodo1:
    <<: *geth-common
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./genesis.json:/genesis.json:ro
      - ./config.toml:/config.toml:ro
      - ./password.txt:/password.txt:ro
      - ./nodes/node1/keystore:/root/.ethereum/keystore:ro
      - ./nodes/node1/nodekey:/nodekey:ro
      - nodo1-data:/root/.ethereum
    ports:
      - "8545:8545"
      - "30303:30303"
      - "30303:30303/udp"
    command: >-
      --config /config.toml
      --datadir /root/.ethereum
      --networkid 1337
      --http --http.addr 0.0.0.0 --http.port 8545
      --http.corsdomain "*" --http.vhosts "*"
      --http.api eth,net,web3,personal,admin,clique,txpool,debug
      --port 30303
      --mine
      --miner.etherbase 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266
      --unlock 0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266
      --password /password.txt
      --allow-insecure-unlock
      --nodiscover
      --syncmode full

  nodo2:
    <<: *geth-common
    depends_on:
      nodo1:
        condition: service_healthy
